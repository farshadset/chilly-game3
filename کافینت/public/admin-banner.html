<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت بنرها</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="fonts/all.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>مدیریت بنرها</h1>
        </header>
        <main>
            <div class="form-card">
                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 0.5rem; justify-content: space-between; width: 100%;">
                    <label style="font-weight: 700; color: #333; white-space: nowrap;">گروه بنر:</label>
                    <div id="bannerGroupSelect" style="display: flex; gap: 0.5rem; align-items: center; direction: ltr;">
                        <button class="btn-confirm" id="addBannerBtn" onclick="openPopup()" style="width: 2.2rem; height: 2.2rem; padding: 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-weight: 400; line-height: 1; margin: 0; display: inline-flex; align-items: center; justify-content: center;" aria-label="افزودن بنر جدید">
                            <i class="fas fa-plus"></i>
                        </button>
                        <label class="banner-group-option active" style="width: 2.2rem; height: 2.2rem; padding: 0; border: 1px solid #ddd; border-radius: 8px; background: #667eea; color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;">
                            <input type="radio" name="bannerGroup" value="1" checked style="display: none;">
                            A
                        </label>
                        <label class="banner-group-option" style="width: 2.2rem; height: 2.2rem; padding: 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;">
                            <input type="radio" name="bannerGroup" value="2" style="display: none;">
                            B
                        </label>
                    </div>
                </div>
                <div id="bannersList"></div>
                <a href="admin.html" class="btn-next">بازگشت</a>
            </div>
        </main>
    </div>

    <div class="popup-overlay" id="bannerPopup" style="display: none;">
        <div class="popup-content">
            <h3 id="popupTitle" style="display: none;">افزودن بنر جدید</h3>
            <div class="banner-preview" style="margin: 15px 0;">
                <p style="display: none;">پیش‌نمایش بنر</p>
                <img id="popupPreviewImg" src="https://placehold.co/800x200/667eea/ffffff?text=کافینت+آنلاین" alt="بنر" style="max-width: 100%;">
            </div>
            <div class="banner-info">
                <small>ابعاد پیشنهادی: 800×200 پیکسل - حداکثر حجم: 200KB - قالب: JPG یا PNG</small>
            </div>
            <div class="form-group">
                <label for="popupBannerUpload">آپلود بنر</label>
                <input type="file" id="popupBannerUpload" accept="image/*">
            </div>
            <div class="form-group">
                <label for="popupBannerLink">لینک بنر (اختیاری)</label>
                <input type="text" id="popupBannerLink" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label for="popupBannerDuration">مدت زمان نمایش (ثانیه)</label>
                <input type="number" id="popupBannerDuration" placeholder="5" value="5" min="1" max="30">
            </div>
            <div class="form-actions">
                <button class="btn-confirm" id="saveBannerPopupBtn">ذخیره</button>
                <button class="btn-next" id="cancelBannerPopupBtn">لغو</button>
            </div>
        </div>
    </div>
    <script>
        var bannersData = [];
        
        function compressImage(file, maxWidth = 1920, maxHeight = 600, quality = 0.95) {
            return new Promise((resolve) => {
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                var img = new Image();
                img.onload = function() {
                    var ratio = Math.min(maxWidth / img.width, maxHeight / img.height);
                    var width = Math.round(img.width * Math.min(ratio, 1));
                    var height = Math.round(img.height * Math.min(ratio, 1));
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(resolve, 'image/jpeg', quality);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function loadBanners() {
            var selectedGroup = getSelectedBannerGroup();
            if (!['1', '2'].includes(selectedGroup)) {
                selectedGroup = '1';
            }

            fetch('/api/banner')
                .then(r => r.json())
                .then(allBanners => {
                    var groupBanners = allBanners.filter(b => parseInt(b.group || 1, 10) == selectedGroup);
                    bannersData = groupBanners;
                    var list = document.getElementById('bannersList');
                    var addBtn = document.getElementById('addBannerBtn');
                    addBtn.disabled = groupBanners.length >= 3;
                    addBtn.style.opacity = groupBanners.length >= 3 ? '0.5' : '1';
                    if (groupBanners.length === 0) {
                        list.innerHTML = '<p style="text-align: center; color: #666;">هیچ بنری برای این گروه ثبت نشده است</p>';
                        return;
                    }
                    list.innerHTML = groupBanners.map(function(banner) {
                        return '<div class="banner-item" data-id="' + banner.id + '" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px;">' +
                            '<img src="' + banner.src + '" style="width: 120px; height: 30px; object-fit: cover; margin-left: 10px; border-radius: 4px;">' +
                            '<div style="display: flex; align-items: center; gap: 8px; margin-right: auto; direction: ltr;">' +
                            '<button class="delete-banner-btn" data-id="' + banner.id + '" style="background: none; border: none; color: #e74c3c; cursor: pointer;"><i class="fas fa-trash"></i></button>' +
                            '<button class="edit-banner-btn" data-id="' + banner.id + '" style="background: none; border: none; color: #667eea; cursor: pointer;"><i class="fas fa-edit"></i></button>' +
                            '</div>' +
                        '</div>';
                    }).join('');
                    
                    document.querySelectorAll('.edit-banner-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var id = this.getAttribute('data-id');
                            var banner = bannersData.find(b => b.id == id);
                            openEditBanner(banner.id, banner.src, banner.link, banner.duration, banner.group || 1);
                        });
                    });
                    document.querySelectorAll('.delete-banner-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var id = this.getAttribute('data-id');
                            if (confirm('آیا از حذف این بنر اطمینان دارید؟')) {
                                fetch('/api/banner/' + id, { method: 'DELETE' })
                                    .then(() => loadBanners());
                            }
                        });
                    });
                })
                .catch(() => {});
        }

        var addBtn;
        var editingBannerId = null;
        var editingBannerGroup = null;

        function getSelectedBannerGroup() {
            var checked = document.querySelector('input[name="bannerGroup"]:checked');
            return checked ? checked.value : '1';
        }

        function setSelectedBannerGroup(group) {
            document.querySelectorAll('.banner-group-option').forEach(function(label) {
                var input = label.querySelector('input');
                var active = input.value == group;
                input.checked = active;
                label.classList.toggle('active', active);
                label.style.background = active ? '#667eea' : '#fff';
                label.style.color = active ? '#fff' : '#333';
            });
        }

        function openPopup() {
            var selectedGroup = getSelectedBannerGroup();
            // Fetch fresh data to check group limit
            fetch('/api/banner')
                .then(r => r.json())
                .then(allBanners => {
                    var groupBanners = allBanners.filter(b => (b.group || 1) == selectedGroup);
                    if (groupBanners.length >= 3) {
                        alert('حداکثر تعداد بنرهای هر گروه ۳ عدد است. برای افزودن بنر جدید، یکی از بنرهای موجود را حذف کنید.');
                        return;
                    }
                    document.getElementById('bannerPopup').style.display = 'flex';
                    document.getElementById('popupTitle').textContent = 'افزودن بنر جدید';
                    document.getElementById('popupPreviewImg').src = 'https://placehold.co/800x200/667eea/ffffff?text=کافینت+آنلاین';
                    document.getElementById('popupBannerUpload').value = '';
                    document.getElementById('popupBannerLink').value = '';
                    document.getElementById('popupBannerDuration').value = '5';
                    editingBannerId = null;
                    editingBannerGroup = null;
                })
                .catch(() => {});
        }

        document.addEventListener('DOMContentLoaded', function() {
            setSelectedBannerGroup(getSelectedBannerGroup());
            loadBanners();

            document.getElementById('cancelBannerPopupBtn').addEventListener('click', function() {
                document.getElementById('bannerPopup').style.display = 'none';
            });

            document.getElementById('popupBannerUpload').addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (file) {
                    compressImage(file).then(blob => {
                        var reader = new FileReader();
                        reader.onload = function(event) {
                            document.getElementById('popupPreviewImg').src = event.target.result;
                        };
                        reader.readAsDataURL(blob);
                    });
                }
            });

            document.getElementById('saveBannerPopupBtn').addEventListener('click', function() {
                var bannerSrc = document.getElementById('popupPreviewImg').src;
                var bannerLink = document.getElementById('popupBannerLink').value;
                var bannerDuration = parseInt(document.getElementById('popupBannerDuration').value, 10) || 5;
                var selectedGroup = parseInt(getSelectedBannerGroup(), 10) || 1;
                var bannerGroup = editingBannerId ? (editingBannerGroup || selectedGroup) : selectedGroup;

                function finish() {
                    document.getElementById('bannerPopup').style.display = 'none';
                    loadBanners();
                }

                if (editingBannerId) {
                    fetch('/api/banner/' + editingBannerId, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ src: bannerSrc, link: bannerLink, duration: bannerDuration, group: bannerGroup })
                    }).then(() => {
                        finish();
                        showToast('بنر با موفقیت ویرایش شد');
                    }).catch(err => alert('خطا: ' + err.message));
                } else {
                    fetch('/api/banner', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ src: bannerSrc, link: bannerLink, duration: bannerDuration, group: bannerGroup })
                    })
                    .then(r => r.json())
                    .then(() => {
                        finish();
                        showToast('بنر با موفقیت ذخیره شد');
                    })
                    .catch(err => alert('خطا در ذخیره بنر: ' + err.message));
                }
            });

            document.querySelectorAll('input[name="bannerGroup"]').forEach(function(input) {
                input.addEventListener('change', function() {
                    if (this.checked) {
                        setSelectedBannerGroup(this.value);
                        loadBanners();
                    }
                });
            });
        });

        function openEditBanner(id, src, link, duration, group) {
            document.getElementById('bannerPopup').style.display = 'flex';
            document.getElementById('popupTitle').textContent = 'ویرایش بنر';
            document.getElementById('popupPreviewImg').src = src;
            document.getElementById('popupBannerUpload').value = '';
            document.getElementById('popupBannerLink').value = link || '';
            document.getElementById('popupBannerDuration').value = duration || 5;
            editingBannerId = id;
            editingBannerGroup = parseInt(group, 10) || 1;
        }

        function showToast(message) {
            var toast = document.createElement('div');
            toast.className = 'toast-success';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.classList.add('show'); }, 10);
            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

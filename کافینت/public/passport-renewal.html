<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمدید پاسپورت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>تمدید گذرنامه</h1>
            <p style="text-align: center; color: #666; margin-top: 0.3rem;">تمدید گذرنامه منقضی شده یا نزدیک به انقضا</p>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="passportRenewal">
                <div class="form-group">
      <label for="phone">شماره تلفن همراه</label>
      <input type="tel" id="phone" name="phone"  placeholder="09xx-xxx-xxxx" required>
      
    </div>

<div class="form-group">
      <label for="nationalId">کد ملی</label>
      <input type="text" id="nationalId" name="nationalId" maxlength="10"  required>
      
    </div>

<div class="form-group">
      <label for="birthYear">سال تولد</label>
      <input type="number" id="birthYear" name="birthYear"   required>
      
    </div>

<div class="form-group">
      <label for="birthMonth">ماه تولد</label>
      <input type="number" id="birthMonth" name="birthMonth"   required>
      
    </div>

<div class="form-group">
      <label for="birthDay">روز تولد</label>
      <input type="number" id="birthDay" name="birthDay"   required>
      
    </div>

<div class="form-group">
      <label for="passportNumber">شماره گذرنامه فعلی</label>
      <input type="text" id="passportNumber" name="passportNumber"   required>
      
    </div>

<div class="form-group">
      <label for="issueDate">تاریخ صدور گذرنامه</label>
      <input type="text" id="issueDate" name="issueDate"   >
      
    </div>

<div class="form-group">
      <label for="expiryDate">تاریخ انقضای گذرنامه</label>
      <input type="text" id="expiryDate" name="expiryDate"   >
      
    </div>

<div class="form-group">
      <label for="renewalReason">دلیل تمدید</label>
      <select id="renewalReason" name="renewalReason" >
        <option value="">انتخاب کنید</option>
        <option value="expiry">انقضا</option>
        <option value="nearExpiry">نزدیک به انقضا</option>
        <option value="lost">مفقودی</option>
        <option value="damaged">خرابی</option>
        <option value="pagesFull">پرشدن صفحات</option>
      </select>
      
    </div>

<div class="form-group">
      <label for="destination">کشور مقصد</label>
      <input type="text" id="destination" name="destination"   >
      
    </div>

<div class="form-group">
      <label for="notes">توضیحات اضافی</label>
      <textarea id="notes" name="notes"  class="additional-notes"></textarea>
      <small></small>
    </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
            
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعلام وضعیت وام ازدواج</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>استعلام وضعیت وام ازدواج</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="marriage-loan-status">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small><span class="warning-text">به نام متقاضی ثبت‌نامی</span></small>
                </div>
                <div class="form-group">
                    <label for="trackingCode">کد رهنه یا کد ملی</label>
                    <input type="text" id="trackingCode" name="trackingCode" placeholder="کد رهنه یا کد ملی" required>
                    <small>کد رهنه ۸ رقمی یا کد ملی خود را وارد کنید</small>
                </div>
                <button type="submit" class="btn-next">استعلام وضعیت</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

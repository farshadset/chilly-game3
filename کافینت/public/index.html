    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var bannerStates = {};

            function showBanners(banners, containerId) {
                var bannerContainer = document.getElementById(containerId);
                banners.forEach(function(b) {
                    if (!b.group) b.group = 1;
                });
                if (banners.length === 0) {
                    bannerContainer.innerHTML = '';
                    return;
                }

                var state = { currentIndex: 0, timeoutId: null };
                bannerStates[containerId] = state;

                function showBanner(index) {
                    state.currentIndex = index;
                    var banner = banners[index];
                    var dotsHtml = '<div class="banner-dots">';
                    banners.forEach(function(b, i) {
                        dotsHtml += '<span class="banner-dot ' + (i === index ? 'active' : '') + '" data-index="' + i + '"></span>';
                    });
                    dotsHtml += '</div>';

                    var html = '<div class="banner">';
                    html += '<img src="' + banner.src + '" alt="بنر کافینت">' + dotsHtml + '</div>';

                    if (banner.link) {
                        html = '<a href="' + banner.link + '" class="banner-link">' + html + '</a>';
                    }
                    bannerContainer.innerHTML = html;

                    var dots = bannerContainer.querySelectorAll('.banner-dot');
                    dots.forEach(function(dot) {
                        dot.addEventListener('click', function() {
                            if (state.timeoutId) clearTimeout(state.timeoutId);
                            var idx = parseInt(this.getAttribute('data-index'));
                            showBanner(idx);
                        });
                    });

                    var duration = banner.duration || 5;
                    state.timeoutId = setTimeout(function() {
                        var nextIndex = (state.currentIndex + 1) % banners.length;
                        showBanner(nextIndex);
                    }, duration * 1000);
                }

                showBanner(0);
            }

            Promise.all([
                fetch('/api/banner?group=1').then(r => r.json()),
                fetch('/api/banner?group=2').then(r => r.json())
            ]).then(function(results) {
                showBanners(results[0], 'bannersContainer1');
                showBanners(results[1], 'bannersContainer2');
            }).catch(() => {});
        });

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var searchInput = document.getElementById('searchInput');
            var searchResults = document.getElementById('searchResults');
            var searchIndex = window.megaMenuSearchIndex || [];
            var debounceTimer = null;

            function highlightText(text, query) {
                if (!query) return text;
                var regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                return text.replace(regex, '<mark style="background:#3f3f46;color:#fff;border-radius:2px;padding:0 1px;">$1</mark>');
            }

            function showResults(matches, query) {
                searchResults.innerHTML = '';
                if (matches.length === 0 || searchInput.value.trim() === '') {
                    searchResults.style.display = 'none';
                    return;
                }

                var limitedMatches = matches.slice(0, 6);

                limitedMatches.forEach(function(match) {
                    var div = document.createElement('div');
                    div.innerHTML = highlightText(match.title, query);
                    div.addEventListener('click', function() {
                        window.location.href = match.link;
                        searchInput.value = '';
                        searchResults.style.display = 'none';
                    });
                    searchResults.appendChild(div);
                });

                searchResults.style.display = 'block';
            }

            function performSearch(query) {
                var searchTerm = query.toLowerCase().trim();

                if (searchTerm === '') {
                    searchResults.style.display = 'none';
                    return;
                }

                var matches = searchIndex.filter(function(item) {
                    return item.title.toLowerCase().includes(searchTerm);
                });

                showResults(matches, searchTerm);
            }

            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                var query = this.value;
                debounceTimer = setTimeout(function() {
                    performSearch(query);
                }, 120);
            });

            document.addEventListener('click', function(e) {
                if (searchInput && searchResults && !searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.style.display = 'none';
                }
            });
        });

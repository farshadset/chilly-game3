<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات سفارشی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>خدمات سفارشی</h1>
        </header>
        <main>
            <form id="customServicesForm" class="form-card">
                <div class="form-group">
                    <label for="serviceType">نوع خدمت</label>
                    <select id="serviceType" name="serviceType" required>
                        <option value="">انتخاب کنید...</option>
                        <option value="document">تدوین سند</option>
                        <option value="translation">ترجمه مدارک</option>
                        <option value="consultation">مشاوره</option>
                        <option value="other">سایر خدمات</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="customerName">نام و نام خانوادگی</label>
                    <input type="text" id="customerName" name="customerName" required>
                </div>

                <div class="form-group">
                    <label for="customerPhone">شماره تلفن</label>
                    <input type="tel" id="customerPhone" name="customerPhone" placeholder="09xx-xxx-xxxx" required>
                </div>
                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">
                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>
                        <div class="attachment-preview hidden" id="attachmentPreview"></div>
                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <div class="textarea-placeholder" id="textareaPlaceholder">
                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>
                        </div>
                    </div>
                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <div class="form-group">
                    <label for="proposedPrice">قیمت پیشنهادی (تومان)</label>
                    <input type="text" id="proposedPrice" name="proposedPrice" placeholder="قیمت مورد نظر خود را وارد کنید" required>
                    <small>قیمت وارد شده بررسی و تایید یا اصلاح توسط مدیر خواهد شد</small>
                </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var userData = JSON.parse(localStorage.getItem('userData') || 'null');
            var form = document.getElementById('customServicesForm');
            setupPriceInputFormatting(document.getElementById('proposedPrice'));
            function getAttachmentMetadata() {
                return (window.currentAttachments || []).map(function(attachment) {
                    return {
                        id: attachment.id,
                        name: attachment.name,
                        type: attachment.type,
                        size: attachment.size,
                        dataUrl: '',
                        uploadedAt: attachment.uploadedAt
                    };
                });
            }
            function saveRegistrationData(data, trackingCode) {
                localStorage.setItem('registrationData', JSON.stringify({
                    ...data,
                    attachments: getAttachmentMetadata()
                }));
                localStorage.setItem('lastTrackingCode', trackingCode);
            }
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(form));
                    data.serviceKey = 'customServices';
                    data.serviceTitle = 'خدمات سفارشی';
                    data.cost = 'قیمت توافقی - ' + document.getElementById('proposedPrice').value;
                    data.status = 'pending';
                    data.priceStatus = 'pending';
                    data.username = userData ? userData.username : null;
                    const uploadAttachments = Array.isArray(window.currentAttachments) ? window.currentAttachments : [];
                    data.attachments = uploadAttachments.map(attachmentForApiStorage);
                    try {
                        const response = await fetch('/api/order', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        const result = await response.json();
                        await window.uploadAttachmentsForTrackingCode(result.trackingCode, uploadAttachments);
                        if (window.saveAttachmentsForTrackingCode && data.attachments.length > 0) {
                            await window.saveAttachmentsForTrackingCode(result.trackingCode, uploadAttachments);
                        }
                        saveRegistrationData(data, result.trackingCode);
                        window.location.href = 'success.html';
                    } catch (error) {
                        const fallbackCode = 'CFT-' + Date.now().toString().slice(-8);
                        await window.uploadAttachmentsForTrackingCode(fallbackCode, uploadAttachments);
                        if (window.saveAttachmentsForTrackingCode && data.attachments.length > 0) {
                            await window.saveAttachmentsForTrackingCode(fallbackCode, uploadAttachments);
                        }
                        saveRegistrationData(data, fallbackCode);
                        window.location.href = 'success.html';
                    }
                });
            }
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

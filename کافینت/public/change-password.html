<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغییر رمز عبور</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="fonts/all.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>تغییر رمز عبور</h1>
        </header>
        <main>
            <form id="changePasswordForm" class="form-card">
                <div class="form-group">
                    <label for="currentPassword">رمز عبور فعلی</label>
                    <span class="input-wrapper">
                        <input type="password" id="currentPassword" name="currentPassword" required>
                        <span class="toggle-password" data-target="currentPassword"><i class="fas fa-eye"></i></span>
                    </span>
                </div>
                <div class="form-group">
                    <label for="newPassword">رمز عبور جدید</label>
                    <span class="input-wrapper">
                        <input type="password" id="newPassword" name="newPassword" required>
                        <span class="toggle-password" data-target="newPassword"><i class="fas fa-eye"></i></span>
                    </span>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">تکرار رمز عبور جدید</label>
                    <span class="input-wrapper">
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" required>
                        <span class="toggle-password" data-target="confirmNewPassword"><i class="fas fa-eye"></i></span>
                    </span>
                </div>
                <button type="submit" class="btn-next">ذخیره تغییرات</button>
            </form>
        </main>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var userData = JSON.parse(localStorage.getItem('userData') || 'null');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            document.querySelectorAll('.toggle-password').forEach(function(icon) {
                icon.addEventListener('click', function() {
                    var targetId = this.getAttribute('data-target');
                    var isPassword = document.getElementById(targetId).type === 'password';
                    
                    if (targetId === 'newPassword' || targetId === 'confirmNewPassword') {
                        var newPwdInput = document.getElementById('newPassword');
                        var confirmPwdInput = document.getElementById('confirmNewPassword');
                        var newPwdIcon = document.querySelector('[data-target="newPassword"]');
                        var confirmPwdIcon = document.querySelector('[data-target="confirmNewPassword"]');
                        if (isPassword) {
                            newPwdInput.type = 'text';
                            confirmPwdInput.type = 'text';
                            newPwdIcon.innerHTML = '<i class="fas fa-eye-slash"></i>';
                            confirmPwdIcon.innerHTML = '<i class="fas fa-eye-slash"></i>';
                        } else {
                            newPwdInput.type = 'password';
                            confirmPwdInput.type = 'password';
                            newPwdIcon.innerHTML = '<i class="fas fa-eye"></i>';
                            confirmPwdIcon.innerHTML = '<i class="fas fa-eye"></i>';
                        }
                    } else {
                        var input = document.getElementById(targetId);
                        if (input.type === 'password') {
                            input.type = 'text';
                            this.innerHTML = '<i class="fas fa-eye-slash"></i>';
                        } else {
                            input.type = 'password';
                            this.innerHTML = '<i class="fas fa-eye"></i>';
                        }
                    }
                });
            });

            var form = document.getElementById('changePasswordForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var currentPwd = document.getElementById('currentPassword').value;
                    var newPwd = document.getElementById('newPassword').value;
                    var confirmPwd = document.getElementById('confirmNewPassword').value;

                    if (!currentPwd || !newPwd || !confirmPwd) {
                        alert('لطفاً همه فیلدها را پر کنید.');
                        return;
                    }
                    if (newPwd !== confirmPwd) {
                        alert('رمز عبور جدید و تکرار آن مطابقت ندارند.');
                        return;
                    }
                    if (newPwd.length < 4) {
                        alert('رمز عبور جدید باید حداقل ۴ کاراکتر باشد.');
                        return;
                    }

                    fetch('/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: userData.username,
                            currentPassword: currentPwd,
                            newPassword: newPwd
                        })
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(res) {
                        if (res.success) {
                            var toast = document.createElement('div');
                            toast.className = 'toast-success';
                            toast.textContent = 'رمز عبور با موفقیت تغییر کرد!';
                            document.body.appendChild(toast);
                            setTimeout(function() { toast.classList.add('show'); }, 10);
                            setTimeout(function() {
                                toast.classList.remove('show');
                                setTimeout(function() { toast.remove(); }, 300);
                            }, 3000);
                            form.reset();
                        } else {
                            alert(res.error || 'خطا در تغییر رمز عبور.');
                        }
                    })
                    .catch(function() {
                        alert('خطا در ارتباط با سرور.');
                    });
                });
            }
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

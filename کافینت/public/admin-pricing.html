     <script src="app.js"></script>
    <script src="app.js"></script>
    <script>
        function formatPrice(price) {
            var numStr = (price !== undefined && price !== null && price !== '') ? String(price) : '0';
            numStr = numStr.replace(/[۰-۹]/g, function(d) { return d.charCodeAt(0) - 0x06F0; });
            numStr = numStr.replace(/[,٬٫]/g, '');
            var match = numStr.match(/\d+/);
            if (!match) return numStr;
            var num = parseInt(match[0], 10);
            if (isNaN(num)) return numStr;
            var formatted = num.toLocaleString('fa-IR').replace(/٬/g, '٫');
            return '\u202A' + numStr.replace(match[0], formatted) + '\u202C';
        }

                                'ارسال لیست بیمه': 'insuranceListSubmission',

                                'کمک هزینه سمعک': 'hearingAid'

                        },
                        'خدمات توکن': {
                            key: 'tokenSetup', title: 'خدمات توکن',
                            subServices: {
                                'راه‌اندازی توکن': 'tokenSetup',
                                'امضا در ثبت من': 'thabtemSign',
                                'امضای نرم‌افزاری': 'softwareSignature'
                            }
                        },
                        'خدمات انتخاباتی': {
                            key: 'firstVoters', title: 'خدمات انتخاباتی',
                            adminOnly: true,
                            subServices: {
                                'رأی اولی‌ها': 'firstVoters',
                                'تعیین شعبه': 'branchDetermination',
                                'تأیید صلاحیت': 'qualificationApproval'
                            }
                        }
                    }
                }
            };
            
            var pricePopup = document.getElementById('pricePopup');
            var serviceNameInput = document.getElementById('serviceNameInput');
            var servicePriceInput = document.getElementById('servicePriceInput');
            var savePriceBtn = document.getElementById('savePriceBtn');
            var closePricePopup = document.getElementById('closePricePopup');

            var state = { expandedCategories: {}, expandedGroups: {} };

            function renderPricing(pricingMap) {
                container.innerHTML = '';
                Object.keys(PRICING_DATA).forEach(function(category) {
                    var catExpanded = !!state.expandedCategories[category];
                    var catDiv = document.createElement('div');
                    catDiv.className = 'pricing-category';
                    var header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerHTML = '<span>' + category + '</span>' +
                        '<i class="fas fa-chevron-left" style="transform:' + (catExpanded ? 'rotate(-90deg)' : '') + ';"></i>';
                    header.addEventListener('click', function() {
                        state.expandedCategories[category] = !state.expandedCategories[category];
                        renderPricing(pricingMap);
                    });
                    catDiv.appendChild(header);
                    if (catExpanded) {
                        var body = document.createElement('div');
                        body.className = 'category-body';
                        var services = PRICING_DATA[category].services || {};
                        Object.keys(services).forEach(function(serviceName) {
                            var service = services[serviceName];
                            var groupKey = category + '||' + serviceName;
                            var grpExpanded = !!state.expandedGroups[groupKey];
                            var groupDiv = document.createElement('div');
                            groupDiv.className = 'pricing-group';
                            var groupHeader = document.createElement('div');
                            groupHeader.className = 'group-header';
                            var priceText = '';
                            if (service.subServices) {
                                var prices = {};
                                Object.keys(service.subServices).forEach(function(subName) {
                                    var subKey = service.subServices[subName];
                                    if (pricingMap[subKey] !== undefined) {
                                        prices[subKey] = pricingMap[subKey];
                                    }
                                });
                                var count = Object.keys(prices).length;
                                var total = Object.values(prices).reduce(function(a, b) { return a + (b || 0); }, 0);
                                priceText = count > 0
                                    ? count + ' خدمته (' + formatPrice(total) + ' تومان)'
                                    : '-';
                            } else if (pricingMap[service.key] !== undefined) {
                                priceText = formatPrice(pricingMap[service.key]) + ' تومان';
                            } else {
                                priceText = '-';
                            }
                            groupHeader.innerHTML = '<span>' + service.title + '</span>' +
                                '<span style="font-weight:400;font-size:0.9rem;color:#666;margin-left:0.5rem;">' + priceText + '</span>' +
                                '<i class="fas fa-chevron-left" style="transform:' + (grpExpanded ? 'rotate(-90deg)' : '') + ';"></i>';
                            groupHeader.addEventListener('click', function(e) {
                                e.stopPropagation();
                                state.expandedGroups[groupKey] = !state.expandedGroups[groupKey];
                                renderPricing(pricingMap);
                            });
                            groupDiv.appendChild(groupHeader);
                            if (grpExpanded) {
                                if (service.subServices) {
                                    Object.keys(service.subServices).forEach(function(subName) {
                                        var subKey = service.subServices[subName];
                                        var subPrice = pricingMap[subKey];
                                        var serviceDiv = document.createElement('div');
                                        serviceDiv.className = 'pricing-service-item';
                                        serviceDiv.innerHTML = '<div class="service-info">' +
                                            '<span class="service-title">' + subName + '</span>' +
                                            '<span class="service-price ' + (typeof subPrice === 'number' ? 'has-price' : '') + '">' +
                                            (typeof subPrice === 'number' ? formatPrice(subPrice) + ' تومان' : 'قیمت تعیین نشده') +
                                            '</span></div>' +
                                            '<button class="set-price-btn" data-service="' + subKey + '" data-title="' + subName + '" data-price="' + (subPrice || '') + '">' +
                                            '<i class="fas fa-edit"></i></button>';
                                        serviceDiv.querySelector('.set-price-btn').addEventListener('click', function(e) {
                                            e.stopPropagation();
                                            currentServiceKey = this.getAttribute('data-service');
                                            serviceNameInput.value = this.getAttribute('data-title');
                                            servicePriceInput.value = this.getAttribute('data-price') || '';
                                            pricePopup.classList.add('active');
                                        });
                                        groupDiv.appendChild(serviceDiv);
                                    });
                                } else {
                                    var price = pricingMap[service.key];
                                    var singleDiv = document.createElement('div');
                                    singleDiv.className = 'pricing-service-item';
                                    singleDiv.innerHTML = '<div class="service-info">' +
                                        '<span class="service-title">' + service.title + '</span>' +
                                        '<span class="service-price ' + (typeof price === 'number' ? 'has-price' : '') + '">' +
                                        (typeof price === 'number' ? formatPrice(price) + ' تومان' : 'قیمت تعیین نشده') +
                                        '</span></div>' +
                                        '<button class="set-price-btn" data-service="' + service.key + '" data-title="' + service.title + '" data-price="' + (price || '') + '">' +
                                        '<i class="fas fa-edit"></i></button>';
                                    singleDiv.querySelector('.set-price-btn').addEventListener('click', function(e) {
                                        e.stopPropagation();
                                        currentServiceKey = this.getAttribute('data-service');
                                        serviceNameInput.value = this.getAttribute('data-title');
                                        servicePriceInput.value = this.getAttribute('data-price') || '';
                                        pricePopup.classList.add('active');
                                    });
                                    groupDiv.appendChild(singleDiv);
                                }
                            }
                            body.appendChild(groupDiv);
                        });
                        catDiv.appendChild(body);
                    }
                    container.appendChild(catDiv);
                });
            }

            fetch('/api/pricing')
                .then(function(r) { return r.json(); })
                .then(function(pricing) {
                    var pricingMap = {};
                    pricing.forEach(function(p) { pricingMap[p.service] = p.price; });
                    renderPricing(pricingMap);
                })
                .catch(function() {
                    container.innerHTML = '<p style="text-align:center;color:red;">خطا در بارگذاری قیمت‌ها.</p>';
                });

            savePriceBtn.addEventListener('click', function() {
                var price = parseInt(servicePriceInput.value) || 0;
                if (!currentServiceKey) return;
                fetch('/api/pricing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ service: currentServiceKey, price: price })
                })
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    if (res.success) {
                        pricePopup.classList.remove('active');
                        location.reload();
                    }
                })
                .catch(function() {
                    alert('خطا در ذخیره قیمت.');
                });
            });

            closePricePopup.addEventListener('click', function() {
                pricePopup.classList.remove('active');
            });

            pricePopup.addEventListener('click', function(e) {
                if (e.target === pricePopup) pricePopup.classList.remove('active');
            });
        });
    </script>

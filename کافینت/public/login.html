<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    <link rel="stylesheet" href="style.css?v=20260701">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="fonts/all.css">
    <style>
        @media (max-width: 768px) {
            .profile-icon, .support-icon {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
                position: absolute !important;
            }
            .bottom-nav { display: flex !important; }
            body { padding-bottom: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ورود</h1>
        </header>
        <main>
            <form id="loginForm" class="form-card">
                <div class="form-group">
                    <label for="loginUsername">نام کاربری</label>
                    <input type="text" id="loginUsername" name="loginUsername" placeholder="نام کاربری" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">رمز عبور</label>
                    <div class="password-field">
                        <input type="password" id="loginPassword" name="loginPassword" placeholder="رمز عبور" required>
                        <span class="toggle-password" id="toggleLoginPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <button type="submit" class="btn-next">ورود</button>
                <label style="display: block; margin-top: 0.5rem;">
                    <input type="checkbox" id="rememberMe"> ذخیره اطلاعات ورود
                </label>
            </form>
            <p style="margin-top: 1rem;">
                <a href="auth.html">ثبت نام</a>
                | حساب کاربری ندارید؟
            </p>
        </main>
    </div>
    <a href="#" class="support-icon" title="پشتیبانی" id="supportBtn"><i class="fas fa-headset"></i></a>
    
    <div class="modal" id="supportModal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <h2>پشتیبانی</h2>
        <div class="support-layout">
            <div class="support-sidebar" id="supportSidebar">
                <div class="sidebar-header">
                    <button class="new-chat-btn" id="newConversationBtn" title="گفتگوی جدید">
                        <i class="fas fa-plus"></i>
                    </button>
                    <h3>گفتگوها</h3>
                </div>
                <div class="conversations-list" id="conversationsList"></div>
            </div>
            <div class="support-main">
                <div class="support-panel" id="chatPanel">
                    <div class="admin-chat-main">
                        <div class="admin-chat-header">
                            <a href="admin-chat.html" class="back-link" style="display: none;">
                                <i class="fas fa-arrow-right"></i>
                                بازگشت
                            </a>
                            <strong id="chatPartner">پشتیبانی</strong>
                        </div>
                        <div class="admin-chat-messages" id="inlineChatMessages"></div>
                        <div class="admin-chat-input-area">
                            <div class="textarea-wrapper">
                                <textarea id="inlineMessageInput" rows="1" maxlength="5000" placeholder="پیام خود را اینجا بنویسید..." class="additional-notes"></textarea>
                                <div class="attachment-preview hidden" id="inlineAttachmentPreview"></div>
                                <button id="inlineSendBtn" class="admin-send-btn" aria-label="ارسال پیام">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="19" x2="12" y2="5"></line>
                                        <polyline points="5 12 12 5 19 12"></polyline>
                                    </svg>
                                </button>
                                <button type="button" class="pin-attachment" id="inlinePinAttachment" title="افزودن فایل">
                                    <i class="fas fa-paperclip"></i>
                                </button>
                                <span class="char-counter" id="charCounter">5000/0</span>
                            </div>
                            <input type="file" id="inlineAttachmentFile" accept="image/*,.pdf" style="display: none;" multiple>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="app.js">
        // Hide old floating icons on mobile, show bottom nav
        function handleMobileNav() {
            const isMobile = window.innerWidth <= 768;
            const oldIcons = document.querySelectorAll('.profile-icon, .support-icon');
            const bottomNav = document.querySelector('.bottom-nav');
            
            if (isMobile) {
                oldIcons.forEach(icon => {
                    icon.style.display = 'none';
                    icon.style.visibility = 'hidden';
                    icon.style.opacity = '0';
                });
                if (bottomNav) {
                    bottomNav.style.display = 'flex';
                }
                document.body.style.paddingBottom = '60px';
            } else {
                if (bottomNav) {
                    bottomNav.style.display = 'none';
                }
                document.body.style.paddingBottom = '0';
            }
        }
        
        window.addEventListener('load', handleMobileNav);
        window.addEventListener('resize', handleMobileNav);

    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

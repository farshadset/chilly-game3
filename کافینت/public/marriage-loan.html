<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام وام ازدواج</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت‌نام وام ازدواج</h1>
        </header>
        <main>
            <form id="marriageLoanForm" class="form-card">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small><span class="warning-text">حتماً به نام خود شخص باشد.</span> <span class="success-text">تمام مراحل از طریق پیامک پیگیری می‌شود.</span></small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی (خود شخص)</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                    <small>متقاضی باید بالای ۱۸ سال باشد.</small>
                </div>

                <div class="form-group">
                    <label>تاریخ تولد</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>دقیقاً مطابق با شناسنامه</small>
                </div>

                <div class="form-group">
                    <label>تاریخ عقد</label>
                    <div class="date-fields">
                        <input type="number" id="marriageYear" name="marriageYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="marriageMonth" name="marriageMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="marriageDay" name="marriageDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>مندرج در سند ازدواج</small>
                </div>

                <div class="form-group">
                    <label for="idNumber">شماره شناسنامه</label>
                    <input type="text" id="idNumber" name="idNumber" required>
                    <small>سری و شماره شناسنامه خود را وارد کنید.</small>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <div class="info-item"><strong>قیمت خدمات:</strong> <span class="cost-value" id="displayCost">در حال بارگذاری...</span></div>
                <button type="submit" class="btn-next">مرحله بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/pricing')
                .then(function(r) { return r.json(); })
                .then(function(pricing) {
                    var pricingMap = {};
                    pricing.forEach(function(p) { pricingMap[p.service] = p.price; });
                    var price = pricingMap['marriage'];
                    var displayCost = document.getElementById('displayCost');
                    if (displayCost) {
                        displayCost.textContent = price ? formatPrice(price) + ' تومان' : formatPrice(250000) + ' تومان';
                    }
                })
                .catch(function() {
                    var displayCost = document.getElementById('displayCost');
                    if (displayCost) {
                        displayCost.textContent = formatPrice(250000) + ' تومان';
                    }
                });
            
            const form = document.getElementById('marriageLoanForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(form));
                    data.serviceKey = 'marriage';
                    data.serviceTitle = 'وام ازدواج';
                    data.cost = document.getElementById('displayCost').textContent;
                    localStorage.setItem('registrationData', JSON.stringify(data));
                    window.location.href = 'review.html';
                });
            }
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

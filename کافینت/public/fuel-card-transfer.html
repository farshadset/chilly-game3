<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتقال کارت سوخت به خودرو جدید</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>انتقال کارت سوخت به خودرو جدید</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="fuel-card-transfer">
                <div class="form-group">
                    <label for="ownerPhone">شماره تلفن همراه صاحب کارت</label>
                    <input type="tel" id="ownerPhone" name="ownerPhone" placeholder="09xx-xxx-xxxx" required>
                </div>
                <div class="form-group">
                    <label for="ownerNationalId">کد ملی صاحب کارت</label>
                    <input type="text" id="ownerNationalId" name="ownerNationalId" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label for="currentPlateLetters">حروف پلاک خودرو فعلی</label>
                    <input type="text" id="currentPlateLetters" name="currentPlateLetters" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="currentPlateNumbersFirst">عدد پلاک خودرو فعلی (۳ رقم اول)</label>
                    <input type="text" id="currentPlateNumbersFirst" name="currentPlateNumbersFirst" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="currentPlateNumbersSecond">عدد پلاک خودرو فعلی (۳ رقم آخر)</label>
                    <input type="text" id="currentPlateNumbersSecond" name="currentPlateNumbersSecond" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="newPlateLetters">حروف پلاک خودرو جدید</label>
                    <input type="text" id="newPlateLetters" name="newPlateLetters" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="newPlateNumbersFirst">عدد پلاک خودرو جدید (۳ رقم اول)</label>
                    <input type="text" id="newPlateNumbersFirst" name="newPlateNumbersFirst" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="newPlateNumbersSecond">عدد پلاک خودرو جدید (۳ رقم آخر)</label>
                    <input type="text" id="newPlateNumbersSecond" name="newPlateNumbersSecond" maxlength="3" required>
                </div>
                <div class="form-group">
                    <label for="newVin">شماره شاسی خودرو جدید (VIN)</label>
                    <input type="text" id="newVin" name="newVin" maxlength="17" required>
                </div>
                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وام ضروری</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>وام ضروری</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="urgent-loan">
                <div class="form-group">
                    <label for="loanType">نوع وام</label>
                    <select id="loanType" name="loanType" required>
                        <option value="">انتخاب کنید</option>
                        <option value="retired">وام ضروری بازنشستگان</option>
                        <option value="employee">وام ضروری کارمندان</option>
                        <option value="student">وام دانشجویی</option>
                    </select>
                    <small>نوع وام مورد نیاز خود را انتخاب کنید</small>
                </div>
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                </div>
                <div class="form-group">
                    <label for="applicantNationalId">کد ملی</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label>تاریخ تولد</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="postalCode">کد پستی ۱۰ رقمی</label>
                    <input type="text" id="postalCode" name="postalCode" maxlength="10" required>
                </div>
                <div class="form-group" id="retiredField" style="display:none;">
                    <label for="retirementCode">شماره بازنشستگی</label>
                    <input type="text" id="retirementCode" name="retirementCode">
                </div>
                <div class="form-group" id="organizationField" style="display:none;">
                    <label for="organizationName">نام سازمان کاری</label>
                    <input type="text" id="organizationName" name="organizationName">
                </div>
                <div class="form-group" id="universityField" style="display:none;">
                    <label for="universityName">نام دانشگاه</label>
                    <input type="text" id="universityName" name="universityName">
                </div>
                <div class="form-group" id="studentIdField" style="display:none;">
                    <label for="studentId">شماره دانشجویی</label>
                    <input type="text" id="studentId" name="studentId">
                </div>
                <div class="form-group">
                    <label for="amount">مبلغ درخواستی (تومان)</label>
                    <input type="text" id="amount" name="amount" placeholder="مثلاً ۵۰,۰۰۰,۰۰۰" required>
                </div>
                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loanType = document.getElementById('loanType');
            loanType.addEventListener('change', function() {
                document.getElementById('retiredField').style.display = this.value === 'retired' ? 'block' : 'none';
                document.getElementById('organizationField').style.display = this.value === 'employee' ? 'block' : 'none';
                document.getElementById('universityField').style.display = this.value === 'student' ? 'block' : 'none';
                document.getElementById('studentIdField').style.display = this.value === 'student' ? 'block' : 'none';
            });
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

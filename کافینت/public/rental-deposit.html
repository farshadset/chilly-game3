<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام ودیعه مسکن اجاره</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت‌نام ودیعه مسکن اجاره</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="rental">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small><span class="warning-text">حتماً به نام مستأجر باشد.</span> <span class="success-text">برای دریافت پیامک بانک فعال باشد.</span></small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی مستأجر</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                    <small>سرپرست خانوار متقاضی</small>
                </div>

                <div class="form-group">
                    <label for="postalCode">کد پستی ۱۰ رقمی</label>
                    <input type="text" id="postalCode" name="postalCode" maxlength="10" required>
                    <small>کد پستی ملک مورد اجاره</small>
                </div>

                <div class="form-group">
                    <label for="contractNumber">شماره قرارداد اجاره</label>
                    <input type="text" id="contractNumber" name="contractNumber" required>
                    <small>مندرج در سربرگ قرارداد رسمی</small>
                </div>

                <div class="form-group">
                    <label for="iban">شماره شبا (IBAN)</label>
                    <input type="text" id="iban" name="iban" placeholder="IRxxxxxxxxxxxxxxxxxxxxxxxxxx" maxlength="26" required>
                    <small>برای واریز تسهیلات</small>
                </div>

                <div class="form-group">
                    <label for="depositAmount">مبلغ ودیعه (تومان)</label>
                    <input type="text" id="depositAmount" name="depositAmount" placeholder="مثلاً ۵۰,۰۰۰,۰۰۰" required>
                    <small>مبلغ مندرج در قرارداد</small>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>

                <button type="submit" class="btn-next">مرحله بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام تافل و آیلتس</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت‌نام تافل و آیلتس</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="ielts-toefl">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small>حتماً به نام خود داوطلب باشد.</small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی داوطلب</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10">
                    <small>(برای ثبت‌نام داخلی)</small>
                </div>

                <div class="form-group">
                    <label for="passportNumber">شماره پاسپورت</label>
                    <input type="text" id="passportNumber" name="passportNumber" required>
                    <small>برای آزمون‌های بین‌المللی الزامی است.</small>
                </div>

                <div class="form-group">
                    <label>تاریخ تولد (میلادی)</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1900" max="2100" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>مطابق با پاسپورت</small>
                </div>

                <div class="form-group">
                    <label>نوع آزمون</label>
                    <div class="checkbox-group">
                        <label><input type="radio" name="examType" value="toefl" required> تافل iBT</label>
                        <label><input type="radio" name="examType" value="ielts-academic"> آیلتس آکادمیک</label>
                        <label><input type="radio" name="examType" value="ielts-general"> آیلتس جنرال</label>
                    </div>
                    <small>نوع آزمون مورد نظر را انتخاب کنید.</small>
                </div>

                <div class="form-group">
                    <label for="city">شهر محل برگزاری</label>
                    <select id="city" name="city" required>
                        <option value="">انتخاب کنید</option>
                        <option value="tehran">تهران</option>
                        <option value="isfahan">اصفهان</option>
                        <option value="shiraz">شیراز</option>
                        <option value="mashhad">مشهد</option>
                        <option value="karaj">کرج</option>
                        <option value="tabriz">تبریز</option>
                    </select>
                    <small>تهران، اصفهان، شیراز، مشهد و...</small>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>

                <button type="submit" class="btn-next">مرحه بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

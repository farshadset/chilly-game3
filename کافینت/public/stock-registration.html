<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افتتاح کد بورسی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>افتتاح کد بورسی</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="stock-registration">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                </div>
                <div class="form-group">
                    <label for="applicantNationalId">کد ملی</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label for="bankName">نام بانک</label>
                    <select id="bankName" name="bankName" required>
                        <option value="">انتخاب کنید</option>
                        <option value="melli">بانک ملی ایران</option>
                        <option value="melli-int">بانک ملی ایران (بین‌المللی)</option>
                        <option value="saman">بانک سپه</option>
                        <option value="pasargad">بانک پاسارگاد</option>
                        <option value="keshavarzi">بانک کشاورزی</option>
                        <option value="mashreq">بانک مشهد</option>
                        <option value="other">سایر بانک‌ها</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

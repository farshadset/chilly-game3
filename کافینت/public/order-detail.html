<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات سفارش</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="fonts/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>جزئیات سفارش</h1>
        </header>
        <main>
            <div class="order-detail-card" id="orderDetail">
                <p>بارگذاری...</p>
            </div>
            <a href="orders-pending.html" class="btn-next" style="margin-top:1rem;display:inline-block;">بازگشت</a>
        </main>
    </div>
    <script src="service-extra-configs.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            var container = document.getElementById('orderDetail');
            
            function isSpecialService(order) {
                return order.serviceKey === 'resumeEmployment' || 
                       order.serviceKey === 'customServices' || 
                       order.serviceKey === 'articlesResearch' ||
                       (order.jobField || order.experienceYears || order.skills) ||
                       (order.researchType || order.subject || order.academicLevel) ||
                       order.serviceDescription;
            }
            
            function getServiceTitle(order) {
                var serviceTitle = (order.title && order.title !== '-') ? order.title : (order.serviceTitle || '-');
                if (serviceTitle && serviceTitle !== '-') return serviceTitle;
                
                var isFuelCard = order.ownerPhone || order.ownerNationalId || order.vin;
                var isMarriageLoan = order.applicantPhone || order.applicantNationalId || order.idNumber;
                var isKonkor = order.regionCode || order.educationLevel || order.applicantNationalId;
                var isRental = order.contractNumber || order.depositAmount || order.iban;
                var isHousing = order.ownershipStatus || order.familyCount;
                var isIeltsToefl = order.passportNumber || order.examType;
                var isInternet = order.address || order.operator;
                var isCriminalRecord = order.birthplace;
                var isSmartCard = order.serialNumber;
                var isHealthInsurance = order.familyMembers;
                
                if (isFuelCard) return 'کارت سوخت';
                else if (isMarriageLoan) return 'وام ازدواج';
                else if (isKonkor) return 'کنکور سراسری';
                else if (isRental) return 'ودیعه مسکن اجاره';
                else if (isHousing) return 'نهضت ملی مسکن';
                else if (isIeltsToefl) return 'ثبت‌نام تافل و آیلتس';
                else if (isInternet) return 'ثبت‌نام اینترنت پرسرعت';
                else if (isCriminalRecord) return 'گواهی عدم سوء پیشینه';
                else if (isSmartCard) return 'کارت ملی هوشمند';
                else if (isHealthInsurance) return 'بیمه سلامت';
                else if (order.serviceKey === 'resumeEmployment') return 'رزومه و استخدام';
                else if (order.serviceKey === 'articlesResearch') return 'مقاله و تحقیق';
                else if (order.serviceKey === 'customServices') return 'خدمات سفارشی';
                else return 'پیش ثبت نام مدارس';
            }
            
            function formatValue(value, options) {
                if (value === undefined || value === null || value === '') return null;
                return options ? (options[value] || value) : value;
            }
            
            function escapeOrderHtml(value) {
                return String(value || '').replace(/[&<>"']/g, function(char) {
                    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
                });
            }

            function mergeAttachments(apiAttachments, savedAttachments) {
                var merged = [];
                var seen = {};
                (apiAttachments || []).concat(savedAttachments || []).forEach(function(attachment) {
                    if (!attachment || !attachment.id || seen[attachment.id]) return;
                    seen[attachment.id] = true;
                    merged.push(attachment);
                });
                return merged;
            }

            function hasAttachmentData(apiAttachments) {
                return (apiAttachments || []).some(function(attachment) {
                    return attachment && (attachment.dataUrl || attachment.url);
                });
            }
            
            function renderFormFields(order) {
                var html = '';
                var serviceKey = order.serviceKey;
                
                if (serviceKey === 'resumeEmployment') {
                    var resumeServiceType = { resume: 'نوشتن رزومه', coverLetter: 'نامه توصیه', linkedin: 'بهینه‌سازی لینکدین', interview: 'مشاوره مصاحبه' };
                    var v = formatValue(order.serviceType, resumeServiceType);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نوع خدمات:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.jobField);
                    if (v) html += '<div class="detail-row"><span class="detail-label">رشته شغلی:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.experienceYears);
                    if (v) html += '<div class="detail-row"><span class="detail-label">سال‌های تجربه:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.skills);
                    if (v) html += '<div class="detail-row"><span class="detail-label">مهارت‌ها:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.targetJob);
                    if (v) html += '<div class="detail-row"><span class="detail-label">سمت شغل مورد نظر:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerName);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نام و نام خانوادگی:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerPhone);
                    if (v) html += '<div class="detail-row"><span class="detail-label">شماره تلفن:</span><span class="detail-value">' + v + '</span></div>';
                } else if (serviceKey === 'articlesResearch') {
                    var researchTypeOpts = { article: 'نوشتن مقاله', research: 'تحقیق علمی', translation: 'ترجمه مقالات', editing: 'ویرایش مقالات' };
                    var academicLevelOpts = { bachelor: 'کارشناسی', master: 'کارشناسی ارشد', phd: 'دکتری' };
                    
                    v = formatValue(order.researchType, researchTypeOpts);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نوع خدمات:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.subject);
                    if (v) html += '<div class="detail-row"><span class="detail-label">رشته / موضوع:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.academicLevel, academicLevelOpts);
                    if (v) html += '<div class="detail-row"><span class="detail-label">سطح تحصیلی:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.pagesCount);
                    if (v) html += '<div class="detail-row"><span class="detail-label">تعداد صفحات:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.deadline);
                    if (v) html += '<div class="detail-row"><span class="detail-label">مهلت تحویل:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerName);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نام و نام خانوادگی:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerPhone);
                    if (v) html += '<div class="detail-row"><span class="detail-label">شماره تلفن:</span><span class="detail-value">' + v + '</span></div>';
                } else if (serviceKey === 'customServices') {
                    var customServiceOpts = { document: 'تدوین سند', translation: 'ترجمه مدارک', consultation: 'مشاوره', other: 'سایر خدمات' };
                    
                    v = formatValue(order.serviceType, customServiceOpts);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نوع خدمت:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerName);
                    if (v) html += '<div class="detail-row"><span class="detail-label">نام و نام خانوادگی:</span><span class="detail-value">' + v + '</span></div>';
                    
                    v = formatValue(order.customerPhone);
                    if (v) html += '<div class="detail-row"><span class="detail-label">شماره تلفن:</span><span class="detail-value">' + v + '</span></div>';
                } else {
                    var otherFields = ['phone', 'nationalId', 'birthYear', 'birthMonth', 'birthDay', 'email', 
                        'ownerPhone', 'ownerNationalId', 'vin', 'applicantPhone', 'applicantNationalId', 
                        'idNumber', 'regionCode', 'educationLevel', 'contractNumber', 'depositAmount', 
                        'iban', 'ownershipStatus', 'familyCount', 'passportNumber', 'examType', 
                        'address', 'operator', 'birthplace', 'serialNumber', 'familyMembers'];
                    var labels = {
                        phone: 'شماره تلفن همراه', nationalId: 'کد ملی', birthYear: 'سال تولد',
                        birthMonth: 'ماه تولد', birthDay: 'روز تولد', email: 'ایمیل',
                        ownerPhone: 'شماره تلفن', ownerNationalId: 'کد ملی', vin: 'شماره VIN',
                        applicantPhone: 'شماره تلفن', applicantNationalId: 'کد ملی', idNumber: 'شماره شناسنامه',
                        regionCode: 'کد منطقه', educationLevel: 'سطح تحصیلی', contractNumber: 'شماره قرارداد',
                        depositAmount: 'مبلغ ودیعه', iban: 'شماره شبا', ownershipStatus: 'وضعیت مالکیت',
                        familyCount: 'تعداد افراد', passportNumber: 'شماره پاسپورت', examType: 'نوع آزمون',
                        address: 'آدرس', operator: 'اپراتور', birthplace: 'محل تولد',
                        serialNumber: 'سریال', familyMembers: 'تعداد افراد خانواده'
                    };
                    otherFields.forEach(function(field) {
                        var v = formatValue(order[field]);
                        if (v) html += '<div class="detail-row"><span class="detail-label">' + labels[field] + ':</span><span class="detail-value">' + v + '</span></div>';
                    });
                }
                
                v = formatValue(order.serviceDescription);
                if (v) html += '<div class="detail-row"><span class="detail-label">توضیحات خدمات:</span><span class="detail-value">' + v + '</span></div>';
                
                return html;
            }
            
            if (!code) {
                container.innerHTML = '<p style="text-align:center;color:red;">کد سفارش نامعتبر است.</p>';
                return;
            }
            fetch('/api/order/' + encodeURIComponent(code))
                .then(function(r) { return r.json(); })
                .then(function(order) {
                    if (!order || order.error) {
                        container.innerHTML = '<p style="text-align:center;color:red;">سفارش پیدا نشد.</p>';
                        return;
                    }
                    
                    var serviceTitle = getServiceTitle(order);
                    var isPricePending = order.status === 'pending' && isSpecialService(order) && ['pending', 'countersent', 'usercounter'].includes(order.priceStatus);
                    var isPriceAccepted = order.status === 'pending' && isSpecialService(order) && order.priceStatus === 'accepted' && !order.paid;
                    
                    var paymentLabel = isPricePending 
                        ? 'در انتظار تایید قیمت' 
                        : isPriceAccepted
                        ? 'در انتظار پرداخت'
                        : order.paid ? 'پرداخت شده' : order.status === 'pending' ? 'پرداخت شده' : order.status;
                    
                    var paymentClass = isPricePending || isPriceAccepted
                        ? 'status-pending'
                        : order.paid ? 'paid-badge' : order.status === 'pending' ? 'paid-badge' : 'order-status status-' + order.status;
                    
                    var paymentRow = '<div class="detail-row"><span class="detail-label">وضعیت پرداخت:</span><span class="detail-value"><span class="' + paymentClass + '">' + paymentLabel + '</span></span></div>';
                    
                    var priceRow = '';
                    if (isSpecialService(order)) {
                        if (['pending', 'countersent', 'usercounter'].includes(order.priceStatus)) {
                            var displayedPrice = order.priceStatus === 'countersent' ? order.adminProposedPrice : order.proposedPrice;
                            priceRow = '<div class="detail-row"><span class="detail-label">قیمت پیشنهادی:</span><span class="detail-value price-value">' + formatPrice(displayedPrice) + '&nbsp;&nbsp;تومان</span></div>';
                        } else if (order.priceStatus === 'accepted') {
                            priceRow = '<div class="detail-row"><span class="detail-label">قیمت نهایی:</span><span class="detail-value price-value">' + formatPrice(order.adminProposedPrice || order.proposedPrice) + '&nbsp;&nbsp;تومان</span></div>';
                        }
                    }
                    
                    var paymentButton = '';
                    if (isSpecialService(order) && order.priceStatus === 'accepted' && !order.paid) {
                        paymentButton = '<div class="detail-row" style="text-align:center;margin-top:1rem;"><button id="confirmPaymentStatusBtn" class="btn-confirm" style="background:#27ae60;color:white;border:none;padding:0.5rem 1.5rem;border-radius:4px;cursor:pointer;font-size:1rem;">تایید پرداخت</button></div>';
                    }
                    
var formFieldsHtml = renderFormFields(order);
                    
                    (async function() {
                        var additionalNotes = order.additionalNotes || '';
                        var savedAttachments = [];
                        if (!hasAttachmentData(order.attachments)) {
                            for (var i = 0; i < 20 && !window.getAttachmentsForTrackingCode; i++) {
                                await new Promise(r => setTimeout(r, 100));
                            }
                            if (window.getAttachmentsForTrackingCode) {
                                savedAttachments = await window.getAttachmentsForTrackingCode(order.trackingCode) || [];
                            }
                        }
                        var allAttachments = mergeAttachments(order.attachments, savedAttachments);
                        var notesText = additionalNotes || 'ندارد';
                        var notesValueHtml = '<span class="detail-value"><span class="detail-notes-text">' + escapeOrderHtml(notesText) + '</span></span>';
                        if (allAttachments.length > 0) {
                            notesValueHtml = '<span class="detail-value detail-value-with-attachment"><span class="detail-notes-text">' + escapeOrderHtml(notesText) + '</span><button type="button" class="detail-attachment-button" data-code="' + escapeOrderHtml(order.trackingCode) + '" title="مشاهده فایل‌های پیوست"><i class="fas fa-paperclip"></i></button></span>';
                        }
                       
                        container.innerHTML = '<h2 style="text-align:center;margin-bottom:1rem;">' + (order.username || 'کاربر') + '</h2>' +
                            '<div class="detail-row"><span class="detail-label">کد سفارش:</span><span class="detail-value">' + order.trackingCode + '</span></div>' +
                            '<div class="detail-row"><span class="detail-label">نوع سرویس:</span><span class="detail-value">' + serviceTitle + '</span></div>' +
                            formFieldsHtml +
                            '<div class="detail-row"><span class="detail-label">توضیحات:</span>' + notesValueHtml + '</div>' +
                            priceRow +
                            paymentRow +
                            paymentButton;
                        
                        var notesAttachmentBtn = document.querySelector('.detail-attachment-button');
                        if (notesAttachmentBtn) {
                            notesAttachmentBtn.addEventListener('click', function(event) {
                                event.stopPropagation();
                                window.openAttachmentPopup(allAttachments, { adminMode: false, code: order.trackingCode });
                            });
                        }
                        
                        var priceSnapshot = JSON.stringify({
                            status: order.status,
                            priceStatus: order.priceStatus,
                            proposedPrice: order.proposedPrice,
                            adminProposedPrice: order.adminProposedPrice,
                            cost: order.cost
                        });
                        
                        var priceRefreshTimer = setInterval(function() {
                            if (document.visibilityState && document.visibilityState !== 'visible') {
                                return;
                            }
                            
                            fetch('/api/order/' + encodeURIComponent(code))
                                .then(function(r) { return r.json(); })
                                .then(function(latestOrder) {
                                    if (!latestOrder || latestOrder.error) return;
                                    
                                    var latestSnapshot = JSON.stringify({
                                        status: latestOrder.status,
                                        priceStatus: latestOrder.priceStatus,
                                        proposedPrice: latestOrder.proposedPrice,
                                        adminProposedPrice: latestOrder.adminProposedPrice,
                                        cost: latestOrder.cost
                                    });
                                    
                                    if (latestSnapshot !== priceSnapshot) {
                                        priceSnapshot = latestSnapshot;
                                        location.reload();
                                    }
                                })
                                .catch(function() {});
                        }, 5000);
                        
                        window.addEventListener('beforeunload', function() {
                            clearInterval(priceRefreshTimer);
                        });
                        
                        var confirmPaymentBtn = document.getElementById('confirmPaymentStatusBtn');
                        if (confirmPaymentBtn) {
                            confirmPaymentBtn.addEventListener('click', function() {
                                fetch('/api/order/pay', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ trackingCode: code })
                                })
                                .then(function(r) { return r.json(); })
                                .then(function(res) {
                                    if (res.success) {
                                        location.reload();
                                    }
                                })
                                .catch(function() {});
                            });
                        }
                    })()
                })
                .catch(function() {
                    container.innerHTML = '<p style="text-align:center;color:red;">خطا در بارگذاری جزئیات.</p>';
                });
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

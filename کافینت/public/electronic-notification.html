<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابلاغ الکترونیک</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>فعالسازی ابلاغ الکترونیک</h1>
            <p style="text-align: center; color: #666; margin-top: 0.3rem;">ثبت نام و فعالسازی سامانه ابلاغ الکترونیک قضایی</p>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="electronicNotification">
                <div class="form-group">
      <label for="phone">شماره تلفن همراه</label>
      <input type="tel" id="phone" name="phone"  placeholder="09xx-xxx-xxxx" required>
      
    </div>

<div class="form-group">
      <label for="nationalId">کد ملی</label>
      <input type="text" id="nationalId" name="nationalId" maxlength="10"  required>
      
    </div>

<div class="form-group">
      <label for="birthYear">سال تولد</label>
      <input type="number" id="birthYear" name="birthYear"   required>
      
    </div>

<div class="form-group">
      <label for="birthMonth">ماه تولد</label>
      <input type="number" id="birthMonth" name="birthMonth"   required>
      
    </div>

<div class="form-group">
      <label for="birthDay">روز تولد</label>
      <input type="number" id="birthDay" name="birthDay"   required>
      
    </div>

<div class="form-group">
      <label for="caseNumber">شماره پرونده (در صورت وجود)</label>
      <input type="text" id="caseNumber" name="caseNumber"   >
      
    </div>

<div class="form-group">
      <label for="court">دادگاه مربوطه</label>
      <input type="text" id="court" name="court"   >
      
    </div>

<div class="form-group">
      <label for="email">ایمیل</label>
      <input type="email" id="email" name="email"   >
      
    </div>

<div class="form-group">
      <label for="notes">توضیحات اضافی</label>
      <textarea id="notes" name="notes"  class="additional-notes"></textarea>
      <small></small>
    </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
            
                <div class="form-group" style="background: #f0f4ff; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                    <p style="margin: 0 0 0.5rem; font-size: 0.9rem; color: #555;">
                        <i class="fas fa-external-link-alt"></i>
                        این سرویس مستقیماً از طریق سامانه رسمی ارائه می‌شود.
                    </p>
                    <a href="https://adliran.ir" target="_blank" rel="noopener" class="btn-next" style="display: inline-block; text-decoration: none; background: #667eea;">
                        رفتن به سامانه رسمی <i class="fas fa-arrow-left" style="margin-right: 0.3rem;"></i>
                    </a>
                </div>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

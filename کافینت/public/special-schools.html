<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام مدارس خاص</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت نام مدارس خاص</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="special-schools">
                <div class="form-group">
                    <label for="schoolType">نوع مدرسه</label>
                    <select id="schoolType" name="schoolType" required>
                        <option value="">انتخاب کنید</option>
                        <option value="shahed">مدارس شاهد</option>
                        <option value="nemone-dovvom">مدارس نمونه دولتی</option>
                        <option value="samt">مدارس تیزهوشان (سمپاد)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="parentPhone">شماره تلفن همراه پدر/مادر</label>
                    <input type="tel" id="parentPhone" name="parentPhone" placeholder="09xx-xxx-xxxx" required>
                </div>
                <div class="form-group">
                    <label for="parentNationalId">کد ملی والدین</label>
                    <input type="text" id="parentNationalId" name="parentNationalId" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label for="studentNationalId">کد ملی دانش‌آموز</label>
                    <input type="text" id="studentNationalId" name="studentNationalId" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label for="postalCode">کد پستی ۱۰ رقمی</label>
                    <input type="text" id="postalCode" name="postalCode" maxlength="10" required>
                </div>
                <div class="form-group" id="sampadField" style="display:none;">
                    <label for="preferredField">رشته مورد علاقه (سمپاد)</label>
                    <select id="preferredField" name="preferredField">
                        <option value="">انتخاب کنید</option>
                        <option value="physics">فیزیک</option>
                        <option value="math">ریاضی</option>
                        <option value="chemistry">شیمی</option>
                        <option value="biology">زیست</option>
                        <option value="literature">ادبیات</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <div class="textarea-wrapper">

                        <textarea id="additionalNotes" name="additionalNotes" class="additional-notes" style="height: 150px;" data-rtl-listener="true"></textarea>

                        <div class="attachment-preview hidden" id="attachmentPreview"></div>

                        <button type="button" class="pin-attachment" id="pinAttachment" title="افزودن فایل">

                            <i class="fas fa-paperclip"></i>

                        </button>

                        <div class="textarea-placeholder" id="textareaPlaceholder">

                            <span>میتوانید چهار تصویر آپلود</span><span class="cursor"></span>

                        </div>

                    </div>

                    <input type="file" id="attachmentFile" accept="image/*,.pdf" style="display: none;">
                </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <script>
        document.getElementById('schoolType').addEventListener('change', function() {
            document.getElementById('sampadField').style.display = this.value === 'samt' ? 'block' : 'none';
        });
    </script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>

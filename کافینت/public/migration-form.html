<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم مهاجرت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>فرم ارزیابی اولیه مهاجرت</h1>
            <p style="text-align: center; color: #666; margin-top: 0.3rem;">پر کردن فرم ارزیابی اولیه برای مشاوره مهاجرت</p>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="migrationForm">
                <div class="form-group">
      <label for="phone">شماره تلفن همراه</label>
      <input type="tel" id="phone" name="phone"  placeholder="09xx-xxx-xxxx" required>
      
    </div>

<div class="form-group">
      <label for="email">ایمیل</label>
      <input type="email" id="email" name="email"   required>
      
    </div>

<div class="form-group">
      <label for="nationalId">کد ملی</label>
      <input type="text" id="nationalId" name="nationalId" maxlength="10"  required>
      
    </div>

<div class="form-group">
      <label for="birthYear">سال تولد</label>
      <input type="number" id="birthYear" name="birthYear"   required>
      
    </div>

<div class="form-group">
      <label for="birthMonth">ماه تولد</label>
      <input type="number" id="birthMonth" name="birthMonth"   required>
      
    </div>

<div class="form-group">
      <label for="birthDay">روز تولد</label>
      <input type="number" id="birthDay" name="birthDay"   required>
      
    </div>

<div class="form-group">
      <label for="maritalStatus">وضعیت تأهل</label>
      <select id="maritalStatus" name="maritalStatus" required>
        <option value="">انتخاب کنید</option>
        <option value="single">مجرد</option>
        <option value="married">متاهل</option>
        <option value="divorced">مطلله</option>
        <option value="widow">بیوه</option>
      </select>
      
    </div>

<div class="form-group">
      <label for="education">سطح تحصیلات</label>
      <select id="education" name="education" required>
        <option value="">انتخاب کنید</option>
        <option value="diploma">دیپلم</option>
        <option value="associate">کاردانی</option>
        <option value="bachelor">کارشناسی</option>
        <option value="master">کارشناسی ارشد</option>
        <option value="phd">دکتری</option>
        <option value="other">سایر</option>
      </select>
      
    </div>

<div class="form-group">
      <label for="field">رشته تحصیلی/شغلی</label>
      <input type="text" id="field" name="field"   >
      
    </div>

<div class="form-group">
      <label for="experience">سابقه کاری (سال)</label>
      <input type="number" id="experience" name="experience"   >
      
    </div>

<div class="form-group">
      <label for="language">سطح زبان انگلیسی</label>
      <select id="language" name="language" >
        <option value="">انتخاب کنید</option>
        <option value="none">ندارم</option>
        <option value="basic">مقدماتی</option>
        <option value="intermediate">متوسط</option>
        <option value="advanced">پیشرفته</option>
        <option value="fluent">سواد</option>
      </select>
      
    </div>

<div class="form-group">
      <label for="destination">کشب مقصد مد نظر</label>
      <input type="text" id="destination" name="destination"   >
      
    </div>

<div class="form-group">
      <label for="immigrationType">نوع مهاجرت</label>
      <select id="immigrationType" name="immigrationType" >
        <option value="">انتخاب کنید</option>
        <option value="education">تحصیلی</option>
        <option value="work">کاری</option>
        <option value="investment">سرمایه گذاری</option>
        <option value="refugee">پناهندگی</option>
        <option value="family">خانوادگی</option>
        <option value="other">سایر</option>
      </select>
      
    </div>

<div class="form-group">
      <label for="budget">بودجه تقریبی (تومان)</label>
      <input type="text" id="budget" name="budget"   >
      
    </div>

<div class="form-group">
      <label for="notes">توضیحات اضافی</label>
      <textarea id="notes" name="notes"  class="additional-notes"></textarea>
      <small></small>
    </div>
                <button type="submit" class="btn-next">ثبت درخواست</button>
            </form>
            
        </main>
    </div>
    <link rel="stylesheet" href="fonts/all.css">
    <script src="app.js"></script>
    <nav class="bottom-nav">
        <a href="/" class="nav-icon" title="خانه">
            <i class="fas fa-home"></i>
        </a>
        <a href="/profile.html" class="nav-icon" title="پروفایل">
            <i class="fas fa-user"></i>
        </a>
        <a href="#" class="nav-icon" title="پشتیبانی" id="supportNavBtn">
            <i class="fas fa-headset"></i>
        </a>
    </nav>
</body>
</html>
